# ============================================================
# Streamlit Cloud Secrets Template — Nu Shine Dental Nova Bot
# ============================================================
# Copy this into Streamlit Cloud Dashboard:
#   https://share.streamlit.io → Your App → Settings → Secrets
# ============================================================

# --- Required: Gemini API Key (already set) ---
GEMINI_API_KEY = "your_gemini_api_key_here"

# --- Optional: Google Sheets ---
# 1. Go to https://console.cloud.google.com → Create a service account
# 2. Download the JSON key, paste it below as a single line
# 3. Share your Google Sheet with the service account email
# 4. Get the Sheet ID from the URL: https://docs.google.com/spreadsheets/d/<THIS_IS_THE_ID>/edit
GSHEET_ID = "your_google_sheet_id_here"
GCP_SERVICE_ACCOUNT = '''{
  "type": "service_account",
  "project_id": "your-project-id",
  "private_key_id": "...",
  "private_key": "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n",
  "client_email": "your-sa@your-project.iam.gserviceaccount.com",
  "client_id": "...",
  "auth_uri": "https://accounts.google.com/o/oauth2/auth",
  "token_uri": "https://oauth2.googleapis.com/token",
  "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
  "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/your-sa@your-project.iam.gserviceaccount.com"
}'''

# --- Optional: Email Alerts (Gmail or any SMTP) ---
# For Gmail: Use an App Password (not your regular password)
#   https://myaccount.google.com/apppasswords
EMAIL_SMTP_SERVER = "smtp.gmail.com"
EMAIL_SMTP_PORT = "587"
EMAIL_SENDER = "your-clinic-email@gmail.com"
EMAIL_PASSWORD = "your_gmail_app_password_here"
EMAIL_RECIPIENT = "reception-number@gmail.com"

# --- Optional: Webhook (Zapier / Make.com) ---
WEBHOOK_URL = "https://hooks.zapier.com/hooks/catch/your_webhook_id"

# --- Optional: APIs ---
WEATHER_API_KEY = "your_openweather_api_key_here"
NEWS_API_KEY = "your_news_api_key_here"
